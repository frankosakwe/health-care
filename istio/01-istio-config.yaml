---
# Request Authentication
apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: healthcare-auth
  namespace: healthcare
spec:
  jwtRules:
  - issuer: "https://auth-service/auth/jwt"
    jwksUri: "https://auth-service/auth/jwks"
    audiences: "healthcare-api"

---
# Authorization Policy - Allow API Gateway to Services
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-api-gateway
  namespace: healthcare
spec:
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/healthcare/sa/healthcare-service"]
    to:
    - operation:
        methods: ["GET", "POST", "PUT", "DELETE"]
        ports: ["3001", "3002", "3003", "3004", "3005"]

---
# Rate Limiting - Istio Request Authentication
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: healthcare
spec:
  mtls:
    mode: STRICT
