---
# Network Policy - Allow Consul Access
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-consul
  namespace: healthcare
spec:
  podSelector:
    matchLabels:
      app: consul
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 8500
    - protocol: TCP
      port: 8600
    - protocol: UDP
      port: 8600

---
# Network Policy - Allow DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: healthcare
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
