---
# Network Policy - Default Deny All Ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: healthcare
spec:
  podSelector: {}
  policyTypes:
  - Ingress

---
# Network Policy - Allow API Gateway Ingress
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-gateway-ingress
  namespace: healthcare
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - podSelector:
        matchLabels:
          app: api-gateway
    ports:
    - protocol: TCP
      port: 5000
    - protocol: TCP
      port: 9090

---
# Network Policy - Auth Service Can Receive from API Gateway and Other Services
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-service
  namespace: healthcare
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api-gateway
    - podSelector:
        matchLabels:
          app: patient-service
    - podSelector:
        matchLabels:
          app: claims-service
    - podSelector:
        matchLabels:
          app: payment-service
    - podSelector:
        matchLabels:
          app: notification-service
    ports:
    - protocol: TCP
      port: 3001
    - protocol: TCP
      port: 50051

---
# Network Policy - Patient Service Can Receive from API Gateway and Services
apiVersion: networking.k8s.io/v1
