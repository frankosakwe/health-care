syntax = "proto3";

package healthcare.notification;

option go_package = "github.com/healthcare/notification/pb";
option java_package = "com.healthcare.notification";
option java_outer_classname = "NotificationProto";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// Notification Service
service NotificationService {
  rpc SendNotification (SendNotificationRequest) returns (NotificationResponse) {}
  rpc GetNotifications (GetNotificationsRequest) returns (GetNotificationsResponse) {}
  rpc MarkAsRead (MarkAsReadRequest) returns (google.protobuf.Empty) {}
  rpc SubscribeToChannel (SubscribeRequest) returns (google.protobuf.Empty) {}
  rpc SendBulkNotifications (SendBulkNotificationsRequest) returns (BulkNotificationResponse) {}
}

enum NotificationType {
  EMAIL = 0;
  SMS = 1;
  PUSH = 2;
  IN_APP = 3;
}

enum NotificationStatus {
  PENDING = 0;
  SENT = 1;
  DELIVERED = 2;
  FAILED = 3;
  UNREAD = 4;
  READ = 5;
}

message Notification {
  string id = 1;
  string recipient_id = 2;
  string title = 3;
  string body = 4;
  NotificationType type = 5;
  NotificationStatus status = 6;
  map<string, string> metadata = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp sent_at = 9;
  google.protobuf.Timestamp read_at = 10;
}

message SendNotificationRequest {
  string recipient_id = 1;
  string title = 2;
  string body = 3;
  NotificationType type = 4;
  map<string, string> metadata = 5;
  bool high_priority = 6;
}

message NotificationResponse {
  bool success = 1;
  string notification_id = 2;
  string error = 3;
}

message GetNotificationsRequest {
  string recipient_id = 1;
  int32 page = 2;
  int32 limit = 3;
  NotificationStatus status = 4;
}

message GetNotificationsResponse {
  repeated Notification notifications = 1;
  int32 total = 2;
  int32 unread_count = 3;
}

message MarkAsReadRequest {
  string notification_id = 1;
}

message SubscribeRequest {
  string user_id = 1;
  string channel = 2;
}

message SendBulkNotificationsRequest {
  repeated string recipient_ids = 1;
  string title = 2;
  string body = 3;
  NotificationType type = 4;
}

message BulkNotificationResponse {
  int32 total_sent = 1;
  int32 total_failed = 2;
  repeated string failed_ids = 3;
}
