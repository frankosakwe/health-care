syntax = "proto3";

package healthcare.patient;

option go_package = "github.com/healthcare/patient/pb";
option java_package = "com.healthcare.patient";
option java_outer_classname = "PatientProto";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

// Patient Service
service PatientService {
  rpc GetPatient (GetPatientRequest) returns (Patient) {}
  rpc CreatePatient (CreatePatientRequest) returns (Patient) {}
  rpc UpdatePatient (UpdatePatientRequest) returns (Patient) {}
  rpc DeletePatient (DeletePatientRequest) returns (google.protobuf.Empty) {}
  rpc ListPatients (ListPatientsRequest) returns (ListPatientsResponse) {}
  rpc GetPatientRecords (GetPatientRecordsRequest) returns (GetPatientRecordsResponse) {}
  rpc UpdatePatientRecords (UpdatePatientRecordsRequest) returns (google.protobuf.Empty) {}
}

message Patient {
  string id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string phone = 5;
  string date_of_birth = 6;
  string gender = 7;
  Address address = 8;
  string insurance_id = 9;
  string policy_number = 10;
  repeated MedicalHistory medical_history = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message Address {
  string street = 1;
  string city = 2;
  string state = 3;
  string zip_code = 4;
  string country = 5;
}

message MedicalHistory {
  string condition = 1;
  string diagnosis_date = 2;
  string status = 3;
  repeated string medications = 4;
}

message GetPatientRequest {
  string patient_id = 1;
}

message CreatePatientRequest {
  string first_name = 1;
  string last_name = 2;
  string email = 3;
  string phone = 4;
  string date_of_birth = 5;
  string gender = 6;
  Address address = 7;
  string insurance_id = 8;
  string policy_number = 9;
}

message UpdatePatientRequest {
  string patient_id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string phone = 5;
  Address address = 6;
  string insurance_id = 7;
}

message DeletePatientRequest {
  string patient_id = 1;
}

message ListPatientsRequest {
  int32 page = 1;
  int32 limit = 2;
  string filter = 3;
}

message ListPatientsResponse {
  repeated Patient patients = 1;
  int32 total = 2;
  int32 page = 3;
  int32 limit = 4;
}

message PatientRecord {
  string id = 1;
  string patient_id = 2;
  string record_type = 3;
  string content = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message GetPatientRecordsRequest {
  string patient_id = 1;
  string record_type = 2;
}

message GetPatientRecordsResponse {
  repeated PatientRecord records = 1;
}

message UpdatePatientRecordsRequest {
  string patient_id = 1;
  string record_type = 2;
  string content = 3;
}
